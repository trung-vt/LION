channels:
  - astra-toolbox
  - conda-forge

dependencies:
  - python=3.12
  - pip<=25.2
  - astra-toolbox>=2.3
  - pip:
      # Core project dependencies (from [project].dependencies, except the self reference LION[codestyle])
      - "tomosipo @ git+https://github.com/ahendriksen/tomosipo.git@v0.7.0"
      - "ts_algorithms @ git+https://github.com/ahendriksen/ts_algorithms.git"
      - deepinv
      - h5py
      - imageio
      - kornia
      - lightning
      - matplotlib
      - numpy
      - opencv-python
      - pandas
      - pillow
      - pydicom
      - pylidc
      - ptwt
      - PyWavelets
      - pytorch-wavelets
      - scikit-image
      - scipy
      - spgl1
      - spyrit
      - tifffile
      - torch
      - torchdiffeq
      - torchmetrics
      - torchvision
      - tqdm
      - wandb

      # codestyle extra: [project.optional-dependencies].codestyle
      - jaxtyping

      # ci extra
      - pre-commit

      # tests extra
      - coverage
      - codecov
      - pytest
      - pytest-cov
      - pytest-xdist

      # notebooks extra
      - ipykernel
      - ipywidgets
      - jupytext
      - cmap

      # docs extra
      - "sphinx>=8.1,<8.2"
      - "sphinx_rtd_theme>=3.0,<3.1"
      - "sphinx-pyproject>=0.3,<0.4"
      - "myst-nb>=1.2,<1.3"
      - "sphinx-mathjax-offline<0.1"
      - "sphinx_github_style>=1.2,<1.3"
      - "sphinx-autodoc-typehints>=3,<3.1"
      - "sphinx-copybutton>=0.5,<0.6"
      - "sphinx-last-updated-by-git>=0.3,<0.4"
