name: Set Up LION

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        required: false
        default: main

permissions:
  contents: write

defaults:
  run:
    shell: bash -l {0}

jobs:
  setup_LION:
    name: Set up LION
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: env.yml
          environment-name: lion
          cache-environment: true

      - name: Show conda envs
        run: micromamba env list

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('env.yml', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install all dependencies
        run: |
          python -m pip install -e .[dev]
