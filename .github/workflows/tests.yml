name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up micromamba
        uses: mamba-org/provision-with-micromamba@v16
        with:
          environment-name: lion
          environment-file: env_base.yml
          cache-downloads: true
          cache-env: true

      - name: Show conda envs
        run: micromamba env list

      - name: Run tests
        shell: bash -l {0}
        run: |
          python -m pip install -e .[dev]
          pytest -m "not cuda"
