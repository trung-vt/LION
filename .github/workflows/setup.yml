name: Setup LION

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: env_base.yml
          environment-name: lion
          cache-environment: true

      - name: Show conda envs
        shell: bash -l {0}
        run: micromamba env list

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('env_base.yml', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install all dependencies
        shell: bash -l {0}
        run: |
          python -m pip install -e .[dev]
